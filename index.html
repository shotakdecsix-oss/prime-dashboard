<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Video ランキング</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0f0f1a;--bg2:#16162a;--card:#1e1e35;--card2:#252540;
      --prime:#00a8e1;--prime2:#0088b8;--gold:#f5c518;
      --text:#e8e8f0;--muted:#8888aa;--border:#2a2a4a;
      --green:#22c55e;--red:#ef4444;
    }
    body{font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    /* Setup overlay */
    #setup-overlay{position:fixed;inset:0;z-index:900;background:rgba(5,5,18,.96);display:flex;align-items:center;justify-content:center;padding:20px;}
    #setup-overlay.hidden{display:none;}
    .setup-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:440px;}
    .setup-box h2{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
    .setup-box p{font-size:.75rem;color:var(--muted);margin-bottom:24px;line-height:1.6;}
    .setup-field{margin-bottom:16px;}
    .setup-field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:5px;font-weight:600;}
    .setup-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.78rem;font-family:monospace;outline:none;transition:border-color .15s;}
    .setup-field input:focus{border-color:var(--prime);}
    .setup-field .hint{font-size:.65rem;color:var(--muted);margin-top:4px;}
    .setup-save-btn{width:100%;background:var(--prime);color:#fff;border:none;border-radius:10px;padding:11px;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:8px;}
    .setup-save-btn:hover{opacity:.85;}
    .setup-note{font-size:.65rem;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5;}

    /* Header */
    header{background:linear-gradient(135deg,#0a0a18,#1a1a30);border-bottom:2px solid var(--prime);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;}
    .header-left{display:flex;align-items:center;gap:12px;}
    .prime-badge{background:linear-gradient(135deg,var(--prime),var(--prime2));border-radius:8px;padding:6px 10px;font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:-.5px;}
    .header-title h1{font-size:1.1rem;font-weight:800;}
    .header-title p{font-size:.68rem;color:var(--muted);margin-top:1px;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .api-indicator{display:flex;align-items:center;gap:5px;font-size:.7rem;padding:4px 10px;border-radius:12px;border:1px solid var(--border);}
    .api-indicator.ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#86efac;}
    .api-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}
    .settings-btn{background:rgba(0,168,225,.12);border:1px solid rgba(0,168,225,.35);color:var(--prime);border-radius:8px;padding:5px 12px;font-size:.72rem;font-weight:700;cursor:pointer;}

    /* Tabs */
    .tabs{display:flex;gap:4px;padding:16px 20px 0;background:var(--bg2);border-bottom:1px solid var(--border);}
    .tab{padding:9px 22px;font-size:.85rem;font-weight:700;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
    .tab.active{color:var(--prime);border-bottom-color:var(--prime);}

    /* AI Panel */
    .ai-wrap{padding:16px 20px 0;max-width:1200px;margin:0 auto;}
    .ai-panel{background:linear-gradient(135deg,#0d1a2e,#0a1628);border:1px solid #1a3a5c;border-radius:12px;padding:14px 18px;}
    .ai-panel-header{font-size:.78rem;color:#7ec8e3;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .ai-input-row{display:flex;gap:8px;}
    .ai-input{flex:1;background:#0a1f38;border:1px solid #1a3a5c;border-radius:8px;padding:8px 13px;color:var(--text);font-size:.8rem;outline:none;}
    .ai-input:focus{border-color:var(--prime);}
    .ai-input::placeholder{color:#445566;}
    .ai-submit{background:var(--prime);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;}
    .ai-submit:disabled{opacity:.45;cursor:default;}
    .ai-progress{margin-top:9px;font-size:.73rem;color:#7ec8e3;display:none;}
    .ai-progress-bar{height:3px;background:#1a3a5c;border-radius:2px;margin-top:6px;overflow:hidden;}
    .ai-progress-fill{height:100%;background:var(--prime);border-radius:2px;transition:width .4s ease;}

    /* AI picks section */
    .ai-picks-section{background:linear-gradient(135deg,#070f1e,#0a1225);border:1px solid #1a3a5c;border-radius:12px;padding:16px 18px;margin-bottom:20px;}
    .ai-picks-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
    .ai-picks-title{font-size:.85rem;font-weight:800;color:#7ec8e3;}
    .ai-picks-mood{font-size:.72rem;color:var(--muted);margin-left:4px;}
    .ai-clear-btn{margin-left:auto;background:transparent;border:1px solid #1a3a5c;color:var(--muted);border-radius:6px;padding:3px 9px;font-size:.67rem;cursor:pointer;}
    .ai-clear-btn:hover{border-color:var(--prime);color:var(--prime);}
    .ai-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px;}
    @media(max-width:600px){.ai-card-grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px;}}

    /* AI card (with reason overlay) */
    .ai-movie-card{background:var(--card);border:1px solid #1a3a5c;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;animation:fadeIn .22s ease;position:relative;}
    .ai-movie-card:hover{transform:translateY(-3px);border-color:var(--prime);}
    .ai-rank{position:absolute;top:7px;left:7px;background:rgba(0,168,225,.9);color:#fff;font-size:.62rem;font-weight:900;border-radius:4px;padding:1px 6px;z-index:2;}
    .ai-reason-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(10,18,40,.97) 0%,rgba(10,18,40,.8) 70%,transparent 100%);padding:28px 8px 8px;font-size:.64rem;color:#a8d8ea;line-height:1.45;z-index:2;}

    /* Filter bar */
    .filter-bar{background:var(--bg2);padding:10px 20px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--border);}
    .filter-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
    .filter-label{font-size:.67rem;color:var(--muted);white-space:nowrap;}
    .genre-toggle{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 9px;font-size:.67rem;cursor:pointer;white-space:nowrap;}
    .genre-toggle:hover{border-color:var(--prime);color:var(--prime);}
    .decade-select,.sort-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--text);font-size:.72rem;outline:none;cursor:pointer;}
    .genre-chips-wrap{overflow:hidden;transition:max-height .25s,opacity .25s;max-height:160px;}
    .genre-chips-wrap.collapsed{max-height:0!important;opacity:0;pointer-events:none;}
    .genre-chips{display:flex;gap:5px;flex-wrap:wrap;padding-top:3px;}
    .chip{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .1s;white-space:nowrap;}
    .chip.active,.chip:hover{background:var(--prime);border-color:var(--prime);color:#fff;}

    /* Stats */
    .stats-bar{background:var(--bg);padding:7px 20px;border-bottom:1px solid var(--border);font-size:.7rem;color:var(--muted);}
    .stats-bar strong{color:var(--text);}

    /* Cards */
    .main{padding:20px;max-width:1200px;margin:0 auto;}
    .section-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:15px;}
    @media(max-width:600px){.card-grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px;}.main{padding:10px;}}
    .movie-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;animation:fadeIn .22s ease;}
    .movie-card:hover{transform:translateY(-3px);border-color:var(--prime);}
    .card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card2);display:block;}
    .card-poster-ph{width:100%;aspect-ratio:2/3;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:2.4rem;}
    .card-body{padding:8px 9px;}
    .card-title{font-size:.73rem;font-weight:700;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-meta{display:flex;align-items:center;justify-content:space-between;}
    .card-year{font-size:.63rem;color:var(--muted);}
    .rating-badge{display:flex;align-items:center;gap:2px;background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.3);border-radius:4px;padding:1px 5px;}
    .rating-star{font-size:.58rem;color:var(--gold);}
    .rating-val{font-size:.68rem;font-weight:800;color:var(--gold);}
    .card-genres{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;}
    .genre-tag{font-size:.56rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;}

    .load-more-wrap{text-align:center;padding:22px 0 6px;}
    .load-more-btn{background:linear-gradient(135deg,var(--prime),var(--prime2));color:#fff;border:none;border-radius:9px;padding:9px 30px;font-size:.83rem;font-weight:700;cursor:pointer;}
    .load-more-btn:disabled{opacity:.4;cursor:default;}
    .spinner-wrap{text-align:center;padding:40px;color:var(--muted);font-size:.8rem;}
    .spinner{display:inline-block;width:30px;height:30px;border:3px solid rgba(0,168,225,.2);border-top-color:var(--prime);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:9px;}
    .empty-msg{text-align:center;padding:48px 20px;color:var(--muted);font-size:.85rem;}

    /* Modal */
    #detail-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,5,18,.88);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;}
    #detail-modal.open{display:flex;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;position:relative;}
    .modal-close{position:absolute;top:11px;right:13px;background:transparent;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;z-index:10;}
    .modal-backdrop{width:100%;height:175px;object-fit:cover;background:var(--card2);border-radius:16px 16px 0 0;display:block;}
    .modal-backdrop-ph{width:100%;height:70px;background:linear-gradient(135deg,#1a1a40,#0a0a20);border-radius:16px 16px 0 0;}
    .modal-ai-reason{background:linear-gradient(135deg,#071422,#0a1628);border-left:3px solid var(--prime);padding:9px 13px;margin:12px 0 4px;border-radius:0 7px 7px 0;font-size:.75rem;color:#7ec8e3;line-height:1.5;}
    .modal-body{padding:16px;}
    .modal-header-row{display:flex;gap:13px;margin-bottom:13px;}
    .modal-poster{width:76px;height:114px;border-radius:7px;object-fit:cover;background:var(--card2);flex-shrink:0;margin-top:-46px;border:2px solid var(--border);}
    .modal-poster-ph{width:76px;height:114px;border-radius:7px;background:var(--card2);flex-shrink:0;margin-top:-46px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.7rem;}
    .modal-title-area{flex:1;min-width:0;}
    .modal-title{font-size:1rem;font-weight:800;line-height:1.3;margin-bottom:3px;}
    .modal-original{font-size:.68rem;color:var(--muted);margin-bottom:5px;}
    .modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
    .modal-tag{font-size:.63rem;padding:2px 7px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);}
    .modal-rating-row{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
    .modal-rating-big{font-size:2rem;font-weight:900;color:var(--gold);}
    .modal-rating-sub{font-size:.66rem;color:var(--muted);}
    .modal-stars{font-size:.85rem;color:var(--gold);}
    .modal-sec{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
    .modal-overview{font-size:.78rem;line-height:1.75;opacity:.9;}
    .modal-divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
    .modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .modal-info-item .lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
    .modal-info-item .val{font-size:.76rem;font-weight:600;margin-top:2px;line-height:1.4;}
    .prime-link{display:inline-flex;align-items:center;gap:5px;background:var(--prime);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;margin-top:12px;}
  </style>
</head>
<body>

<!-- Setup Overlay -->
<div id="setup-overlay">
  <div class="setup-box">
    <h2>🎬 Prime Video ランキング</h2>
    <p>初回のみAPIキーを入力してください。次回から自動でログインします。</p>
    <div class="setup-field">
      <label>TMDB APIキー（必須）</label>
      <input type="password" id="setup-tmdb" placeholder="例: abc123def456..." autocomplete="off" />
      <div class="hint">→ <a href="https://www.themoviedb.org/settings/api" target="_blank" style="color:var(--prime)">themoviedb.org</a> で無料取得</div>
    </div>
    <div class="setup-field">
      <label>Claude APIキー（AIおすすめ機能・任意）</label>
      <input type="password" id="setup-claude" placeholder="sk-ant-..." autocomplete="off" />
      <div class="hint">→ <a href="https://console.anthropic.com" target="_blank" style="color:var(--prime)">console.anthropic.com</a> で取得</div>
    </div>
    <button class="setup-save-btn" onclick="setupSave()">保存して始める</button>
    <div class="setup-note">キーはブラウザのlocalStorageにのみ保存されます。外部には送信されません。</div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="prime-badge">prime</div>
    <div class="header-title">
      <h1>Prime Video ランキング</h1>
      <p>TMDB × 評価順 / 人気順 / 新着順</p>
    </div>
  </div>
  <div class="header-right">
    <div class="api-indicator ok">
      <div class="api-dot"></div>
      <span>API接続中</span>
    </div>
    <button class="settings-btn" onclick="openSetup()">&#9881; 設定</button>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-movie" onclick="switchTab('movie')">🎬 映画</button>
  <button class="tab" id="tab-tv" onclick="switchTab('tv')">📺 ドラマ・アニメ</button>
</div>

<!-- AI Panel -->
<div class="ai-wrap">
  <div class="ai-panel">
    <div class="ai-panel-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      AI おすすめ — 気分を伝えると、Claudeが作品リストから直接選びます
    </div>
    <div class="ai-input-row">
      <input class="ai-input" id="ai-mood-input" placeholder="例:「だらっと笑えるやつ」「感動したい」「90年代の名作」「家族で見られるもの」" />
      <button class="ai-submit" id="ai-submit-btn" onclick="runAiSuggest()">✨ 探す</button>
    </div>
    <div class="ai-progress" id="ai-progress">
      <span id="ai-progress-text">作品リストを取得中...</span>
      <div class="ai-progress-bar"><div class="ai-progress-fill" id="ai-progress-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="filter-row">
    <span class="filter-label">ジャンル</span>
    <button class="genre-toggle" id="genre-toggle-btn" onclick="toggleGenreChips()">&#9660; 開く</button>
    <span class="filter-label" style="margin-left:6px">年代</span>
    <select class="decade-select" id="decade-select" onchange="onDecadeChange()">
      <option value="">すべて</option>
      <option value="2020">2020年代</option>
      <option value="2010">2010年代</option>
      <option value="2000">2000年代</option>
      <option value="1990">1990年代</option>
      <option value="1980">〜1989年</option>
    </select>
    <select class="sort-select" id="sort-select" onchange="onSortChange()" style="margin-left:auto">
      <option value="vote_average.desc">&#9733; 評価順</option>
      <option value="popularity.desc">人気順</option>
      <option value="release_date.desc">新着順</option>
    </select>
  </div>
  <div class="genre-chips-wrap collapsed" id="genre-chips-wrap">
    <div class="genre-chips" id="genre-chips">
      <button class="chip active" onclick="selectGenre(0,this)">すべて</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"><span>読み込み中...</span></div>

<div class="main">
  <!-- AI picks injected here -->
  <div id="ai-picks-wrap"></div>
  <!-- Normal grid -->
  <div id="card-grid-wrap"><div class="spinner-wrap"><div class="spinner"></div><div style="margin-top:8px">読み込み中...</div></div></div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">もっと見る</button>
  </div>
</div>

<!-- Modal -->
<div id="detail-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
var API_KEY = '';
var CLAUDE_KEY = '';
var CURRENT_TAB = 'movie';
var CURRENT_GENRE = 0;
var CURRENT_SORT = 'vote_average.desc';
var CURRENT_PAGE = 1;
var TOTAL_PAGES = 1;
var GENRES = {};
var IS_LOADING = false;
var CURRENT_DECADE = '';
var GENRE_OPEN = false;
var AI_PICKS = {};      // id -> reason
var CURRENT_DETAIL_ITEM = null;
var IMG_BASE = 'https://image.tmdb.org/t/p/';
var PROVIDER_ID = 9;

// ── Setup ──
function setupSave() {
  var tmdb = document.getElementById('setup-tmdb').value.trim();
  var claude = document.getElementById('setup-claude').value.trim();
  if (!tmdb) { alert('TMDBのAPIキーは必須です'); return; }
  API_KEY = tmdb;
  localStorage.setItem('tmdb_key', tmdb);
  if (claude) { CLAUDE_KEY = claude; localStorage.setItem('claude_key', claude); }
  document.getElementById('setup-overlay').classList.add('hidden');
  loadGenres().then(function() { resetAndLoad(); });
}
function openSetup() {
  document.getElementById('setup-tmdb').value = '';
  document.getElementById('setup-claude').value = '';
  document.getElementById('setup-overlay').classList.remove('hidden');
}

// ── AI suggest (full two-pass) ──
function setProgress(pct, text) {
  document.getElementById('ai-progress').style.display = 'block';
  document.getElementById('ai-progress-text').textContent = text;
  document.getElementById('ai-progress-fill').style.width = pct + '%';
}
function hideProgress() { document.getElementById('ai-progress').style.display = 'none'; }

async function runAiSuggest() {
  var mood = document.getElementById('ai-mood-input').value.trim();
  if (!mood) return;
  if (!CLAUDE_KEY) {
    alert('AIおすすめ機能を使うにはClaude APIキーが必要です。右上の「設定」から入力してください。');
    return;
  }
  var btn = document.getElementById('ai-submit-btn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    // Step 1: fetch candidate pool — full filtered set if filter active, mixed-sort sample otherwise
    setProgress(10, '作品リストを取得中...');
    var candidates = [];
    var seenIds = {};
    var hasFilter = !!(CURRENT_GENRE || CURRENT_DECADE);
    var commonParams = {
      api_key: API_KEY, language: 'ja-JP',
      with_watch_providers: PROVIDER_ID, watch_region: 'JP',
      'vote_count.gte': CURRENT_TAB === 'movie' ? 50 : 20
    };
    if (CURRENT_GENRE) commonParams.with_genres = CURRENT_GENRE;
    if (CURRENT_DECADE) {
      var dk = CURRENT_TAB === 'movie' ? 'primary_release_date' : 'first_air_date';
      var dn = parseInt(CURRENT_DECADE);
      commonParams[dk + '.gte'] = CURRENT_DECADE + '-01-01';
      commonParams[dk + '.lte'] = CURRENT_DECADE === '1980' ? '1989-12-31' : (dn + 9) + '-12-31';
    }

    if (hasFilter) {
      // Filter active: fetch up to 20 pages (400 items) sorted by popularity, full pool
      var fp = Object.assign({}, commonParams, { sort_by: 'popularity.desc' });
      for (var p = 1; p <= 20; p++) {
        fp.page = p;
        var pr = await fetch('https://api.themoviedb.org/3/discover/' + CURRENT_TAB + '?' + new URLSearchParams(fp));
        var pd = await pr.json();
        var results = pd.results || [];
        results.forEach(function(item) {
          if (!seenIds[item.id]) { seenIds[item.id] = true; candidates.push(item); }
        });
        setProgress(10 + p * 2, '作品リストを取得中... (' + candidates.length + '件)');
        if (p >= (pd.total_pages || 1)) break; // stop if no more pages
      }
    } else {
      // No filter: mix 3 sort strategies for diversity (5+3+2 pages ≈ 150-200 items)
      var strategies = [
        { sort: 'popularity.desc', pages: 5 },
        { sort: 'vote_average.desc', pages: 3 },
        { sort: (CURRENT_TAB === 'movie' ? 'primary_release_date' : 'first_air_date') + '.desc', pages: 2 }
      ];
      var totalSteps = strategies.reduce(function(s,x){ return s+x.pages; }, 0);
      var fetched = 0;
      for (var si = 0; si < strategies.length; si++) {
        var strat = strategies[si];
        var sp = Object.assign({}, commonParams, { sort_by: strat.sort });
        for (var p = 1; p <= strat.pages; p++) {
          sp.page = p;
          var pr = await fetch('https://api.themoviedb.org/3/discover/' + CURRENT_TAB + '?' + new URLSearchParams(sp));
          var pd = await pr.json();
          (pd.results || []).forEach(function(item) {
            if (!seenIds[item.id]) { seenIds[item.id] = true; candidates.push(item); }
          });
          fetched++;
          setProgress(10 + fetched / totalSteps * 40, '作品リストを取得中... (' + candidates.length + '件)');
        }
      }
    }

    // Step 2: build compact list for Claude
    setProgress(55, 'Claudeが選んでいます...');
    var lines = candidates.map(function(item, i) {
      var title = item.title || item.name || '';
      var year = (item.release_date || item.first_air_date || '').slice(0, 4);
      var rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
      var genreNames = (item.genre_ids || []).map(function(id) { return GENRES[id] || ''; }).filter(Boolean).join('/');
      var ov = (item.overview || '').slice(0, 60).replace(/\n/g, ' ');
      return (i + 1) + '. [' + item.id + '] ' + title + ' (' + year + ') ★' + rating + ' [' + genreNames + '] ' + ov;
    });

        var sysPrompt = 'You are a film concierge for Amazon Prime Video Japan. You receive a numbered list of available titles and a mood. Select exactly 8 IDs that best match the mood. CRITICAL RULES: (1) ONLY use IDs that appear in the provided list, never invent or guess IDs. (2) Return ONLY a valid JSON array with no markdown and no text outside the JSON. (3) Output exactly 8 objects.';

    var idToItem = {};
    candidates.forEach(function(c) { idToItem[c.id] = c; });

    async function callClaude(lineSubset, count) {
      var uPrompt = 'Mood: "' + mood + '"\n\nAvailable titles (ONLY use IDs from this list):\n' + lineSubset.join('\n') + '\n\nReturn JSON array of exactly ' + count + ' picks: [{"id": <number>, "reason": "<日本語で20字以内の一言>"}]';
      var r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': CLAUDE_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          system: sysPrompt,
          messages: [{ role: 'user', content: uPrompt }]
        })
      });
      var d = await r.json();
      if (d.error) throw new Error(d.error.message);
      var text = d.content[0].text.trim().replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/, '');
      return JSON.parse(text);
    }

    setProgress(55, 'Claudeが選んでいます...');
    var picks = await callClaude(lines, 8);
    var validPicks = picks.filter(function(pick) { return !!idToItem[pick.id]; });

    // If some picks had invalid IDs, retry with remaining candidates to fill the gap
    if (validPicks.length < 8) {
      setProgress(75, '追加候補を選んでいます...');
      var usedIds = {};
      validPicks.forEach(function(p) { usedIds[p.id] = true; });
      var remainingLines = lines.filter(function(l) {
        var m = l.match(/^\d+\. \[(\d+)\]/);
        return m && !usedIds[parseInt(m[1])];
      });
      var needed = 8 - validPicks.length;
      try {
        var morePicks = await callClaude(remainingLines, needed);
        var moreValid = morePicks.filter(function(pick) { return !!idToItem[pick.id]; });
        validPicks = validPicks.concat(moreValid).slice(0, 8);
      } catch(e2) { /* retry failed, use what we have */ }
    }

    AI_PICKS = {};
    validPicks.forEach(function(pick) { AI_PICKS[pick.id] = pick.reason; });

    setProgress(90, '結果を表示中...');
    // Render AI picks section
    renderAiPicks(validPicks, idToItem, mood);
    setProgress(100, '完了');
    setTimeout(hideProgress, 600);

  } catch(e) {
    hideProgress();
    alert('エラー: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '✨ 探す';
}

function renderAiPicks(picks, idToItem, mood) {
  var wrap = document.getElementById('ai-picks-wrap');
  var html = '<div class="ai-picks-section">' +
    '<div class="ai-picks-header">' +
      '<span class="ai-picks-title">✨ AIセレクション</span>' +
      '<span class="ai-picks-mood">&ldquo;' + escHtml(mood) + '&rdquo;</span>' +
      '<button class="ai-clear-btn" onclick="clearAiPicks()">&#x2715; クリア</button>' +
    '</div>' +
    '<div class="ai-card-grid" id="ai-card-grid"></div>' +
  '</div>';
  wrap.innerHTML = html;
  var grid = document.getElementById('ai-card-grid');
  picks.forEach(function(pick, idx) {
    var item = idToItem[pick.id];
    if (!item) return;
    grid.appendChild(buildAiCard(item, pick.reason, idx + 1));
  });
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearAiPicks() {
  AI_PICKS = {};
  document.getElementById('ai-picks-wrap').innerHTML = '';
}

function buildAiCard(item, reason, rank) {
  var title = item.title || item.name || '不明';
  var year = (item.release_date || item.first_air_date || '').slice(0, 4);
  var rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
  var poster = item.poster_path ? IMG_BASE + 'w300' + item.poster_path : null;
  var div = document.createElement('div');
  div.className = 'ai-movie-card';
  div.onclick = function() { openDetail(item); };
  var posterHtml = poster
    ? '<img class="card-poster" src="' + poster + '" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
      '<div class="card-poster-ph" style="display:none">🎬</div>'
    : '<div class="card-poster-ph">🎬</div>';
  div.innerHTML =
    '<div class="ai-rank">' + rank + '</div>' +
    posterHtml +
    '<div class="ai-reason-overlay">' + escHtml(reason) + '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + escHtml(title) + '</div>' +
      '<div class="card-meta">' +
        '<span class="card-year">' + (year || '—') + '</span>' +
        (item.vote_average ? '<div class="rating-badge"><span class="rating-star">&#9733;</span><span class="rating-val">' + rating + '</span></div>' : '') +
      '</div>' +
    '</div>';
  return div;
}

document.getElementById('ai-mood-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') runAiSuggest();
});

// ── Genre / filter ──
function toggleGenreChips() {
  GENRE_OPEN = !GENRE_OPEN;
  document.getElementById('genre-chips-wrap').classList[GENRE_OPEN ? 'remove' : 'add']('collapsed');
  document.getElementById('genre-toggle-btn').textContent = GENRE_OPEN ? '▲ 閉じる' : '▼ 開く';
}
function onDecadeChange() {
  CURRENT_DECADE = document.getElementById('decade-select').value;
  if (API_KEY) resetAndLoad();
}
function switchTab(tab) {
  CURRENT_TAB = tab;
  document.getElementById('tab-movie').className = tab === 'movie' ? 'tab active' : 'tab';
  document.getElementById('tab-tv').className = tab === 'tv' ? 'tab active' : 'tab';
  var opts = document.getElementById('sort-select').options;
  opts[2].value = tab === 'movie' ? 'release_date.desc' : 'first_air_date.desc';
  CURRENT_GENRE = 0;
  CURRENT_DECADE = '';
  document.getElementById('decade-select').value = '';
  clearAiPicks();
  if (API_KEY) loadGenres().then(function() { resetAndLoad(); });
}
function onSortChange() {
  CURRENT_SORT = document.getElementById('sort-select').value;
  if (API_KEY) resetAndLoad();
}
function selectGenre(id, el) {
  CURRENT_GENRE = id;
  document.querySelectorAll('#genre-chips .chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  if (API_KEY) resetAndLoad();
}
function resetAndLoad() {
  CURRENT_PAGE = 1; TOTAL_PAGES = 1;
  document.getElementById('card-grid-wrap').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div style="margin-top:8px">読み込み中...</div></div>';
  document.getElementById('load-more-wrap').style.display = 'none';
  loadPage(1, true);
}
function loadMore() {
  if (IS_LOADING || CURRENT_PAGE >= TOTAL_PAGES) return;
  CURRENT_PAGE++;
  loadPage(CURRENT_PAGE, false);
}

async function loadGenres() {
  if (!API_KEY) return;
  try {
    var res = await fetch('https://api.themoviedb.org/3/genre/' + CURRENT_TAB + '/list?language=ja-JP&api_key=' + API_KEY);
    var data = await res.json();
    if (data.status_code === 7) { openSetup(); alert('TMDBのAPIキーが無効です'); return; }
    var map = {};
    (data.genres || []).forEach(function(g) { map[g.id] = g.name; });
    GENRES = map;
    renderGenreChips(data.genres || []);
  } catch(e) { console.error(e); }
}
function renderGenreChips(genres) {
  var el = document.getElementById('genre-chips');
  el.innerHTML = '<button class="chip' + (CURRENT_GENRE === 0 ? ' active' : '') + '" onclick="selectGenre(0,this)">すべて</button>';
  genres.forEach(function(g) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (CURRENT_GENRE === g.id ? ' active' : '');
    btn.setAttribute('data-id', g.id);
    btn.textContent = g.name;
    btn.onclick = (function(id) { return function() { selectGenre(id, this); }; })(g.id);
    el.appendChild(btn);
  });
}

async function loadPage(page, reset) {
  if (IS_LOADING) return;
  IS_LOADING = true;
  var btn = document.getElementById('load-more-btn');
  btn.disabled = true; btn.textContent = '読み込み中...';
  var sort = CURRENT_SORT;
  if (CURRENT_TAB === 'tv' && sort === 'release_date.desc') sort = 'first_air_date.desc';
  var params = new URLSearchParams({
    api_key: API_KEY, language: 'ja-JP', sort_by: sort,
    with_watch_providers: PROVIDER_ID, watch_region: 'JP',
    'vote_count.gte': CURRENT_TAB === 'movie' ? 500 : 200, page: page
  });
  if (CURRENT_GENRE) params.set('with_genres', CURRENT_GENRE);
  if (CURRENT_DECADE) {
    var dk = CURRENT_TAB === 'movie' ? 'primary_release_date' : 'first_air_date';
    var dn = parseInt(CURRENT_DECADE);
    params.set(dk + '.gte', CURRENT_DECADE + '-01-01');
    params.set(dk + '.lte', CURRENT_DECADE === '1980' ? '1989-12-31' : (dn + 9) + '-12-31');
  }
  try {
    var res = await fetch('https://api.themoviedb.org/3/discover/' + CURRENT_TAB + '?' + params.toString());
    var data = await res.json();
    if (data.status_code === 7) { openSetup(); alert('APIキーが無効です'); IS_LOADING = false; return; }
    TOTAL_PAGES = Math.min(data.total_pages || 1, 500);
    var total = data.total_results || 0;
    document.getElementById('stats-bar').innerHTML =
      '<span>全 <strong>' + total.toLocaleString() + '</strong> 件' +
      (CURRENT_GENRE && GENRES[CURRENT_GENRE] ? ' ／ ' + GENRES[CURRENT_GENRE] : '') +
      ' ／ ページ ' + page + ' / ' + TOTAL_PAGES + '</span>';
    var results = data.results || [];
    if (reset) {
      if (!results.length) {
        document.getElementById('card-grid-wrap').innerHTML = '<div class="empty-msg">該当作品がありません</div>';
        document.getElementById('load-more-wrap').style.display = 'none';
        IS_LOADING = false; return;
      }
      document.getElementById('card-grid-wrap').innerHTML =
        (Object.keys(AI_PICKS).length === 0 ? '' : '<div class="section-label" style="margin-top:16px">全作品一覧</div>') +
        '<div class="card-grid" id="card-grid"></div>';
    }
    var grid = document.getElementById('card-grid');
    results.forEach(function(item) { grid.appendChild(buildCard(item)); });
    document.getElementById('load-more-wrap').style.display = CURRENT_PAGE < TOTAL_PAGES ? '' : 'none';
    btn.textContent = 'もっと見る'; btn.disabled = false;
  } catch(e) {
    document.getElementById('stats-bar').innerHTML = '<span style="color:var(--red)">エラー: ' + escHtml(e.message) + '</span>';
  }
  IS_LOADING = false;
}

function buildCard(item) {
  var title = item.title || item.name || '不明';
  var year = (item.release_date || item.first_air_date || '').slice(0, 4);
  var rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
  var poster = item.poster_path ? IMG_BASE + 'w300' + item.poster_path : null;
  var genres = (item.genre_ids || []).slice(0, 2).map(function(id) { return GENRES[id] || ''; }).filter(Boolean);
  var div = document.createElement('div');
  div.className = 'movie-card';
  div.onclick = function() { openDetail(item); };
  var posterHtml = poster
    ? '<img class="card-poster" src="' + poster + '" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
      '<div class="card-poster-ph" style="display:none">🎬</div>'
    : '<div class="card-poster-ph">🎬</div>';
  div.innerHTML = posterHtml +
    '<div class="card-body">' +
      '<div class="card-title">' + escHtml(title) + '</div>' +
      '<div class="card-meta">' +
        '<span class="card-year">' + (year || '—') + '</span>' +
        (item.vote_average ? '<div class="rating-badge"><span class="rating-star">&#9733;</span><span class="rating-val">' + rating + '</span></div>' : '') +
      '</div>' +
      (genres.length ? '<div class="card-genres">' + genres.map(function(g) { return '<span class="genre-tag">' + escHtml(g) + '</span>'; }).join('') + '</div>' : '') +
    '</div>';
  return div;
}

function starsHtml(avg) {
  var full = Math.floor(avg / 2);
  var half = (avg / 2 - full) >= 0.4 ? 1 : 0;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
}

async function openDetail(item) {
  CURRENT_DETAIL_ITEM = item;
  document.getElementById('detail-modal').className = 'open';
  document.getElementById('modal-content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div style="margin-top:8px">読み込み中...</div></div>';
  try {
    var ep = CURRENT_TAB === 'movie'
      ? 'https://api.themoviedb.org/3/movie/' + item.id + '?api_key=' + API_KEY + '&language=ja-JP&append_to_response=credits'
      : 'https://api.themoviedb.org/3/tv/' + item.id + '?api_key=' + API_KEY + '&language=ja-JP&append_to_response=credits';
    var res = await fetch(ep);
    var d = await res.json();
    var title = d.title || d.name || '不明';
    var origTitle = d.original_title || d.original_name || '';
    var year = (d.release_date || d.first_air_date || '').slice(0, 4);
    var rating = d.vote_average ? d.vote_average.toFixed(1) : '—';
    var votes = (d.vote_count || 0).toLocaleString();
    var overview = d.overview || '概要は登録されていません。';
    var poster = d.poster_path ? IMG_BASE + 'w300' + d.poster_path : null;
    var backdrop = d.backdrop_path ? IMG_BASE + 'w780' + d.backdrop_path : null;
    var genres = (d.genres || []).map(function(g) { return g.name; }).join(' / ') || '—';
    var runtime = d.runtime
      ? Math.floor(d.runtime / 60) + '時間' + ('0' + d.runtime % 60).slice(-2) + '分'
      : (d.episode_run_time && d.episode_run_time[0] ? d.episode_run_time[0] + '分/話' : '—');
    var seasons = d.number_of_seasons ? d.number_of_seasons + 'シーズン' : '';
    var cast = (d.credits && d.credits.cast || []).slice(0, 5).map(function(c) { return c.name; }).join('、') || '—';
    var searchUrl = 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(title) + '&i=instant-video';
    var aiReason = AI_PICKS[item.id] ? '<div class="modal-ai-reason">✨ AIコメント: ' + escHtml(AI_PICKS[item.id]) + '</div>' : '';
    var backdropHtml = backdrop
      ? '<img class="modal-backdrop" src="' + backdrop + '" onerror="this.style.display=\'none\'">'
      : '<div class="modal-backdrop-ph"></div>';
    var posterHtml = poster
      ? '<img class="modal-poster" src="' + poster + '" onerror="this.style.display=\'none\'">'
      : '<div class="modal-poster-ph">🎬</div>';
    document.getElementById('modal-content').innerHTML =
      backdropHtml +
      '<div class="modal-body">' +
        aiReason +
        '<div class="modal-header-row">' +
          posterHtml +
          '<div class="modal-title-area">' +
            '<div class="modal-title">' + escHtml(title) + '</div>' +
            (origTitle && origTitle !== title ? '<div class="modal-original">' + escHtml(origTitle) + '</div>' : '') +
            '<div class="modal-tags">' +
              (year ? '<span class="modal-tag">📅 ' + year + '</span>' : '') +
              '<span class="modal-tag">' + escHtml(genres) + '</span>' +
              (runtime !== '—' ? '<span class="modal-tag">&#9201; ' + runtime + '</span>' : '') +
              (seasons ? '<span class="modal-tag">' + seasons + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="modal-rating-row">' +
          '<div class="modal-rating-big">' + rating + '</div>' +
          '<div>' +
            '<div class="modal-stars">' + (d.vote_average ? starsHtml(d.vote_average) : '') + '</div>' +
            '<div class="modal-rating-sub">' + votes + ' 件の評価</div>' +
          '</div>' +
        '</div>' +
        '<div class="modal-sec">あらすじ</div>' +
        '<div class="modal-overview">' + escHtml(overview) + '</div>' +
        '<hr class="modal-divider">' +
        '<div class="modal-info-grid">' +
          '<div class="modal-info-item"><div class="lbl">出演</div><div class="val">' + escHtml(cast) + '</div></div>' +
          '<div class="modal-info-item"><div class="lbl">評価数</div><div class="val">' + votes + ' 件</div></div>' +
        '</div>' +
        '<a class="prime-link" href="' + searchUrl + '" target="_blank" rel="noopener">&#9658; Prime Videoで検索</a>' +
      '</div>';
  } catch(e) {
    document.getElementById('modal-content').innerHTML = '<div class="empty-msg">読み込みエラー</div>';
  }
}

function closeModal() { document.getElementById('detail-modal').className = ''; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
(function() {
  var tmdb = localStorage.getItem('tmdb_key');
  var claude = localStorage.getItem('claude_key');
  if (tmdb) {
    API_KEY = tmdb;
    if (claude) CLAUDE_KEY = claude;
    document.getElementById('setup-overlay').classList.add('hidden');
    loadGenres().then(function() { resetAndLoad(); });
  }
})();
</script>
